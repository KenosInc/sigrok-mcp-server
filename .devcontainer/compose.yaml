services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - sigrok-mcp-server-go-mod-cache:/go/pkg/mod
      - ../.claude:/home/vscode/.claude:bind
      - ../.claude.json:/home/vscode/.claude.json:bind
    command: sleep infinity

volumes:
  sigrok-mcp-server-go-mod-cache:
